<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMET💫</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #FF84C3;
      --yellow: #E1E668;
      --orange: #FF9E23;
      --grad: linear-gradient(135deg, #FF84C3 0%, #FF9E23 50%, #E1E668 100%);
      --grad-h: linear-gradient(135deg, #ff9ed4 0%, #ffb347 50%, #eaef7a 100%);
      --bg:        #fff9fb;
      --surface:   #ffffff;
      --border:    #fde0ef;
      --text:      #1a1a18;
      --text-muted:#8a7a80;
      --danger:    #e05a7a;
      --radius:    12px;
      --shadow:    0 2px 12px rgba(255,132,195,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 頂部導覽列 ── */
    header {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(255,132,195,0.07);
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .site-title {
      font-size: 20px;
      font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .role-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      display: none;
      letter-spacing: 0.5px;
    }

    .role-badge.admin {
      background: linear-gradient(90deg,#FF84C3,#FF9E23);
      color: #fff;
    }

    .role-badge.user {
      background: #fde0ef;
      color: #c4447a;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .user-info { display: none; align-items: center; gap: 8px; }

    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--pink);
    }

    .user-name {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 按鈕 ── */
    .btn {
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 2px 8px rgba(255,132,195,0.25);
    }

    .btn-primary:hover:not(:disabled) { background: var(--grad-h); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) { border-color: var(--pink); color: var(--pink); }

    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 14px; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #fbc4d4;
      border-radius: 14px;
    }

    .btn-danger:hover { background: #fff0f4; }

    /* ── 主內容 ── */
    main { max-width: 980px; margin: 0 auto; padding: 32px 20px; }

    /* ── 載入中 ── */
    #view-loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 58px);
      gap: 16px;
    }

    .spinner-wrap { position: relative; width: 48px; height: 48px; }

    .spinner {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 3px solid #fde0ef;
      border-top-color: var(--pink);
      border-right-color: var(--orange);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    /* ── 登入畫面 ── */
    #view-login {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px);
    }

    .login-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 52px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-logo {
      font-size: 48px;
      margin-bottom: 8px;
      display: block;
    }

    .login-brand {
      font-size: 28px;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .btn-google {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: var(--text);
    }

    .btn-google:hover {
      border-color: var(--pink);
      box-shadow: 0 2px 12px rgba(255,132,195,0.15);
    }

    .login-error {
      font-size: 13px;
      color: var(--danger);
      display: none;
      margin-top: 14px;
    }

    /* ── 主分頁 ── */
    .tabs {
      display: none;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      border-radius: 0;
      letter-spacing: 0.3px;
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--pink);
    }

    .tab-btn.admin-only { color: var(--orange); opacity: 0.8; }
    .tab-btn.admin-only.active { opacity: 1; border-bottom-color: var(--orange); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 後台子導覽 ── */
    .admin-subnav {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .subnav-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      background: #fff0f7;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .subnav-btn:hover { border-color: var(--pink); color: var(--pink); }

    .subnav-btn.active {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 8px rgba(255,132,195,0.2);
    }

    /* ── 後台區塊 ── */
    .admin-section { display: none; }
    .admin-section.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── 卡片格線 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .loading-row, .empty-row {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── 團體卡片 ── */
    .group-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .group-card:hover { box-shadow: 0 4px 20px rgba(255,132,195,0.15); transform: translateY(-1px); }

    .group-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: var(--group-color, var(--grad));
    }

    .group-card-name { font-size: 15px; font-weight: 700; color: var(--text); }

    .group-card-color {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted); font-family: monospace;
    }

    .color-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .group-card-meta { font-size: 12px; color: var(--text-muted); }

    .group-card-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* ── 佔位卡片 ── */
    .placeholder-card {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 52px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder-card h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); font-weight: 700; }
    .placeholder-card p  { font-size: 14px; line-height: 1.7; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(255,100,180,0.10);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%; max-width: 440px;
      box-shadow: 0 12px 40px rgba(255,132,195,0.18);
      border: 1.5px solid var(--border);
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 0;
    }

    .modal-title {
      font-size: 17px; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-close {
      background: #fde0ef; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 13px; cursor: pointer;
      color: var(--pink); display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--pink); color: #fff; }

    .modal-body { padding: 20px 26px; display: flex; flex-direction: column; gap: 16px; }

    .modal-footer {
      padding: 0 26px 22px;
      display: flex; justify-content: flex-end; gap: 10px;
    }

    /* ── 表單元素 ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label { font-size: 13px; font-weight: 600; color: var(--text); }

    .required { color: var(--pink); }

    .form-input {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px; color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,132,195,0.10);
    }

    .color-picker-row { display: flex; align-items: center; gap: 10px; }

    .color-input {
      width: 48px; height: 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 3px; cursor: pointer;
      background: var(--surface);
    }

    .color-hint { font-size: 13px; color: var(--text-muted); font-family: monospace; }

    .color-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }

    .color-preset {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
    }

    .color-preset:hover { transform: scale(1.25); border-color: rgba(0,0,0,0.2); }

    .form-error { font-size: 13px; color: var(--danger); min-height: 18px; }

    /* ── 下單系統 placeholder ── */
    .orders-hero {
      text-align: center;
      padding: 48px 20px 32px;
    }

    .orders-hero-title {
      font-size: 26px; font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .orders-hero-sub { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

    /* ── 響應式 ── */
    @media (max-width: 480px) {
      main { padding: 20px 14px; }
      .login-card { padding: 36px 22px; }
      .user-name { display: none; }
      .tab-btn { padding: 8px 12px; font-size: 13px; }
    }

    /* ══ 開團系統 ══════════════════════════════════════════════ */

    /* 匯率列 */
    .rate-bar {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .rate-label {
      font-size: 12px; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; white-space: nowrap;
    }

    .rate-items { display: flex; gap: 16px; flex-wrap: wrap; flex: 1; }

    .rate-item {
      font-size: 13px; color: var(--text-muted);
      background: #fff0f7; border-radius: 8px;
      padding: 3px 10px;
    }

    .rate-item.loaded { color: var(--text); font-weight: 600; }
    .rate-item.error  { color: var(--danger); }

    .rate-refresh {
      background: none; border: none;
      font-size: 16px; cursor: pointer;
      color: var(--pink); padding: 2px 6px;
      border-radius: 8px; transition: background 0.15s;
    }

    .rate-refresh:hover { background: #fde0ef; }

    /* 兩欄佈局 */
    .campaign-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 700px) {
      .campaign-layout { grid-template-columns: 1fr; }
    }

    /* 表單卡片 */
    .form-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: var(--shadow);
    }

    .form-card-title {
      font-size: 15px; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-bottom: 10px;
      border-bottom: 1.5px solid var(--border);
    }

    /* 付款模式選擇 */
    .mode-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-option {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
    }

    .mode-option:hover { border-color: var(--pink); background: #fff0f7; }

    .mode-option input[type="radio"] { display: none; }

    .mode-option.selected {
      border-color: var(--pink);
      background: linear-gradient(135deg, #fff0f7, #fff8e0);
      box-shadow: 0 2px 8px rgba(255,132,195,0.15);
    }

    .mode-icon { font-size: 22px; }
    .mode-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .mode-option.selected .mode-name { color: var(--text); }

    .mode-extra {
      background: #fff8fb;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* 商品列 */
    .product-row {
      display: grid;
      grid-template-columns: 1fr 100px auto;
      gap: 8px;
      align-items: center;
    }

    .product-result {
      grid-column: 1 / -1;
      background: #fff0f7;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
      display: none;
    }

    .product-result.show { display: block; }

    .product-result strong { color: var(--text); font-weight: 700; }

    .product-remove {
      background: none; border: none;
      color: #ffb3ce; font-size: 18px;
      cursor: pointer; padding: 0 4px;
      line-height: 1; transition: color 0.15s;
    }

    .product-remove:hover { color: var(--danger); }

    .btn-add-product {
      background: none; border: 1.5px dashed var(--border);
      border-radius: var(--radius); padding: 9px;
      font-size: 13px; font-weight: 600; color: var(--pink);
      cursor: pointer; transition: all 0.15s;
      width: 100%;
    }

    .btn-add-product:hover { border-color: var(--pink); background: #fff0f7; }

    .fee-row { display: flex; align-items: center; gap: 8px; }
    .fee-unit { font-size: 14px; color: var(--text-muted); }
    .fee-hint { font-size: 12px; color: var(--text-muted); }

    /* 試算結果 */
    .calc-divider { height: 1px; background: var(--border); }
    .calc-result-title { font-size: 13px; font-weight: 700; color: var(--text-muted); }

    .calc-result-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }

    .calc-result-row:last-child { border-bottom: none; }
    .calc-result-name { color: var(--text); font-weight: 600; }
    .calc-result-vals { display: flex; gap: 16px; text-align: right; }
    .calc-cost  { color: var(--text-muted); }
    .calc-price { color: var(--pink); font-weight: 700; }
    .calc-profit{ color: #4caf50; font-weight: 600; }

    /* 文案生成 */
    .copy-tabs { display: flex; gap: 6px; }

    .copy-tab {
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 20px;
      background: none; cursor: pointer; color: var(--text-muted);
      transition: all 0.15s;
    }

    .copy-tab.active {
      background: var(--grad); border-color: transparent;
      color: #fff;
    }

    .copy-panel { display: none; flex-direction: column; gap: 8px; }
    .copy-panel.active { display: flex; }

    .copy-textarea {
      width: 100%; min-height: 220px;
      padding: 14px; font-size: 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: #fff8fb; color: var(--text);
      resize: vertical; line-height: 1.8;
      font-family: inherit;
    }

    .copy-btn { align-self: flex-end; }

    /* 底部按鈕列 */
    .campaign-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      padding-top: 4px;
    }

  </style>
</head>
<body>

<!-- 頂部導覽列 -->
<header>
  <div class="header-left">
    <span class="site-title">COMET💫</span>
    <span class="role-badge" id="role-badge"></span>
  </div>
  <div class="header-right">
    <div class="user-info" id="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="頭像" />
      <span class="user-name" id="user-name"></span>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-signout" style="display:none" onclick="handleSignOut()">登出</button>
    <button class="btn btn-primary btn-sm" id="btn-signin-header" style="display:none" onclick="handleSignIn()">登入</button>
  </div>
</header>

<main>

  <!-- 載入中 -->
  <div id="view-loading">
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <span class="loading-text">載入中...</span>
  </div>

  <!-- 登入畫面 -->
  <div id="view-login">
    <div class="login-card">
      <span class="login-logo">💫</span>
      <div class="login-brand">COMET</div>
      <p class="login-sub">代購小幫手<br>請使用 Google 帳號登入</p>
      <button class="btn-google" id="btn-signin" onclick="handleSignIn()">

<script type="module">
  import { signInWithGoogle, signOutUser, watchAuthState } from "./auth.js";

  let currentRole = null;

  // 監聽登入狀態
  watchAuthState(({ user, role }) => {
    currentRole = role;
    if (!user) {
      showView("login");
      document.getElementById("btn-signin-header").style.display = "inline-flex";
      document.getElementById("btn-signout").style.display = "none";
      document.getElementById("user-info").style.display = "none";
      document.getElementById("role-badge").style.display = "none";
    } else {
      showView("app");
      setupAppUI(user, role);
    }
  });

  function setupAppUI(user, role) {
    const avatar = document.getElementById("user-avatar");
    if (user.photoURL) avatar.src = user.photoURL;
    document.getElementById("user-name").textContent = user.displayName || user.email;
    document.getElementById("user-info").style.display = "flex";
    document.getElementById("btn-signout").style.display = "inline-flex";
    document.getElementById("btn-signin-header").style.display = "none";

    const badge = document.getElementById("role-badge");
    badge.textContent = role === "admin" ? "✦ 管理者" : "會員";
    badge.className = `role-badge ${role}`;
    badge.style.display = "inline-block";

    const tabs = document.getElementById("tabs");
    tabs.style.display = "flex";
    const adminTab = tabs.querySelector('[data-tab="admin"]');
    if (role === "admin") {
      adminTab.style.display = "inline-flex";
    } else {
      adminTab.style.display = "none";
      switchTab("orders");
    }
  }

  window.switchTab = function(tabName) {
    if (tabName === "admin" && currentRole !== "admin") return;
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === tabName);
    });
    document.querySelectorAll(".tab-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === `tab-${tabName}`);
    });
    if (tabName === "admin") loadGroups();
  };

  function showView(name) {
    document.getElementById("view-loading").style.display = "none";
    document.getElementById("view-login").style.display = "none";
    document.getElementById("view-app").style.display = "none";
    if (name === "login") document.getElementById("view-login").style.display = "flex";
    if (name === "app")   document.getElementById("view-app").style.display = "block";
  }

  window.handleSignIn = async function() {
    const errorEl = document.getElementById("login-error");
    errorEl.style.display = "none";
    try { await signInWithGoogle(); }
    catch (e) {
      errorEl.textContent = "登入失敗，請再試一次。(" + e.code + ")";
      errorEl.style.display = "block";
    }
  };

  window.handleSignOut = async function() { await signOutUser(); };
</script>

<!-- ── 團體管理邏輯 ── -->
<script type="module">
  import { db } from "./auth.js";
  import {
    collection, doc, addDoc, updateDoc, getDocs, deleteDoc,
    serverTimestamp, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.switchAdminSection = function(section) {
    document.querySelectorAll(".subnav-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.section === section);
    });
    document.querySelectorAll(".admin-section").forEach(el => {
      el.classList.toggle("active", el.id === "section-"+section);
    });
    if (section === "groups") loadGroups();
    document.dispatchEvent(new CustomEvent("adminSectionChanged", { detail: section }));
  };

  window.loadGroups = async function() {
    const list = document.getElementById("groups-list");
    list.innerHTML = '<div class="loading-row">載入中...</div>';
    try {
      const q = query(collection(db, "groups"), orderBy("createdAt", "asc"));
      const snap = await getDocs(q);
      if (snap.empty) {
        list.innerHTML = '<div class="empty-row">尚無團體，點右上角「新增團體」開始建立。</div>';
        return;
      }
      list.innerHTML = "";
      snap.forEach(d => list.appendChild(renderGroupCard(d.id, d.data())));
    } catch (e) {
      list.innerHTML = `<div class="empty-row" style="color:var(--danger)">載入失敗：${e.message}</div>`;
    }
  };

  function renderGroupCard(id, data) {
    const card = document.createElement("div");
    card.className = "group-card";
    card.style.setProperty("--group-color", data.color);
    card.innerHTML = `
      <div class="group-card-name">${esc(data.name)}</div>
      <div class="group-card-color">
        <span class="color-dot" style="background:${data.color}"></span>
        <span>${data.color}</span>
      </div>
      <div class="group-card-meta">建立於 ${fmtDate(data.createdAt)}</div>
      <div class="group-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="openGroupModal('${id}','${esc(data.name)}','${data.color}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGroup('${id}','${esc(data.name)}')">刪除</button>
      </div>`;
    return card;
  }

  let editingGroupId = null;

  window.openGroupModal = function(id=null, name="", color="#FF84C3") {
    editingGroupId = id;
    document.getElementById("modal-group-title").textContent = id ? "編輯團體" : "新增團體";
    document.getElementById("input-group-name").value = name;
    document.getElementById("input-group-color").value = color;
    document.getElementById("input-group-color-hex").value = color;
    document.getElementById("group-form-error").textContent = "";
    document.getElementById("modal-group").style.display = "flex";
    setTimeout(() => document.getElementById("input-group-name").focus(), 50);
  };

  window.closeGroupModal = function(e) {
    if (e && e.target !== document.getElementById("modal-group")) return;
    document.getElementById("modal-group").style.display = "none";
    editingGroupId = null;
  };

  window.setColor = function(hex) {
    document.getElementById("input-group-color").value = hex;
    document.getElementById("input-group-color-hex").value = hex;
  };

  // color picker → 更新 hex 文字框
  document.getElementById("input-group-color").addEventListener("input", function() {
    document.getElementById("input-group-color-hex").value = this.value;
  });

  // hex 文字框 → 更新 color picker（驗證後才更新）
  document.getElementById("input-group-color-hex").addEventListener("input", function() {
    const val = this.value.trim();
    if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
      document.getElementById("input-group-color").value = val;
      this.style.borderColor = "var(--pink)";
    } else {
      this.style.borderColor = "var(--danger)";
    }
  });

  window.saveGroup = async function() {
    const name    = document.getElementById("input-group-name").value.trim();
    const hexInput = document.getElementById("input-group-color-hex").value.trim();
    const color   = /^#[0-9A-Fa-f]{6}$/.test(hexInput)
      ? hexInput
      : document.getElementById("input-group-color").value;
    const errEl = document.getElementById("group-form-error");
    const btn   = document.getElementById("btn-save-group");
    if (!name) { errEl.textContent = "請填寫團體名稱"; return; }
    btn.disabled = true; btn.textContent = "儲存中..."; errEl.textContent = "";
    try {
      if (editingGroupId) {
        await updateDoc(doc(db, "groups", editingGroupId), { name, color });
      } else {
        await addDoc(collection(db, "groups"), { name, color, createdAt: serverTimestamp() });
      }
      document.getElementById("modal-group").style.display = "none";
      editingGroupId = null;
      await loadGroups();
    } catch (e) {
      errEl.textContent = "儲存失敗：" + e.message;
    } finally {
      btn.disabled = false; btn.textContent = "儲存";
    }
  };

  window.deleteGroup = async function(id, name) {
    if (!confirm(`確定要刪除「${name}」嗎？`)) return;
    try { await deleteDoc(doc(db, "groups", id)); await loadGroups(); }
    catch (e) { alert("刪除失敗：" + e.message); }
  };

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function fmtDate(ts) {
    if (!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  }
</script>


<!-- ── 開團系統邏輯 ── -->
<script type="module">
  import { db } from "./auth.js";
  import {
    collection, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── 匯率 ──────────────────────────────────────────────────────
  let rates = { KRW: null, JPY: null, CNY: null, USD: null };

  const LABELS = { KRW:"韓幣", JPY:"日幣", CNY:"人民幣", USD:"美金" };

  window.fetchRates = async function() {
    // 重置 UI
    Object.keys(LABELS).forEach(code => {
      const el = document.getElementById(`rate-${code}`);
      el.textContent = `${LABELS[code]} 載入中...`;
      el.className = "rate-item";
    });

    try {
      // Frankfurter API：歐洲央行資料，免費無需 key，支援 CORS
      // 一次拿回所有幣別對 TWD 的匯率
      const res = await fetch("https://api.frankfurter.app/latest?from=TWD&to=KRW,JPY,CNY,USD");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      // data.rates = { KRW: 43.21, JPY: 4.52, CNY: 0.22, USD: 0.031 }
      // 這是「1 TWD = X 外幣」，我們要「1 外幣 = X TWD」→ 取倒數
      Object.keys(LABELS).forEach(code => {
        const el = document.getElementById(`rate-${code}`);
        if (data.rates[code]) {
          rates[code] = 1 / data.rates[code];
          el.textContent = `${LABELS[code]} ${rates[code].toFixed(4)}`;
          el.className = "rate-item loaded";
        } else {
          el.textContent = `${LABELS[code]} 無資料`;
          el.className = "rate-item error";
        }
      });
    } catch (err) {
      console.error("Frankfurter 失敗：", err);
      // 備用：Open Exchange Rates 的免費端點（不需 key，僅限 USD base）
      // 先抓 USD/TWD，再用交叉匯率換算
      try {
        const r2 = await fetch("https://open.er-api.com/v6/latest/USD");
        if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
        const d2 = await r2.json();
        const usdToTwd = d2.rates["TWD"];
        Object.keys(LABELS).forEach(code => {
          const el = document.getElementById(`rate-${code}`);
          const usdToCode = d2.rates[code];
          if (usdToTwd && usdToCode) {
            rates[code] = usdToTwd / usdToCode; // 1 外幣 = ? TWD
            el.textContent = `${LABELS[code]} ${rates[code].toFixed(4)}`;
            el.className = "rate-item loaded";
          } else {
            el.textContent = `${LABELS[code]} 無資料`;
            el.className = "rate-item error";
          }
        });
      } catch (err2) {
        console.error("備用 API 也失敗：", err2);
        Object.keys(LABELS).forEach(code => {
          const el = document.getElementById(`rate-${code}`);
          el.textContent = `${LABELS[code]} 無法取得`;
          el.className = "rate-item error";
        });
      }
    }
    recalcAll();
  };

  // 頁面切換到開團系統時自動載入匯率
  document.addEventListener("adminSectionChanged", (e) => {
    if (e.detail === "campaigns" && rates.KRW === null) fetchRates();
  });

  // ── 商品列表管理 ─────────────────────────────────────────────
  let productRows = [];
  let rowCounter = 0;

  window.addProductRow = function() {
    rowCounter++;
    const id = rowCounter;
    productRows.push(id);
    const list = document.getElementById("products-list");
    const div = document.createElement("div");
    div.className = "product-entry";
    div.id = `product-entry-${id}`;
    div.innerHTML = `
      <div class="product-row">
        <input class="form-input" id="p-name-${id}" type="text" placeholder="商品名稱" oninput="recalcRow(${id})" />
        <input class="form-input" id="p-price-${id}" type="number" placeholder="外幣金額" min="0" oninput="recalcRow(${id})" />
        <button class="product-remove" onclick="removeProductRow(${id})">✕</button>
      </div>
      <div class="product-result" id="p-result-${id}"></div>`;
    list.appendChild(div);
    document.getElementById(`p-name-${id}`).focus();
  };

  window.removeProductRow = function(id) {
    productRows = productRows.filter(r => r !== id);
    document.getElementById(`product-entry-${id}`)?.remove();
    updateCalcResults();
    updateCopywriter();
  };

  window.recalcRow = function(id) {
    const currency = document.getElementById("calc-currency").value;
    const markup   = parseFloat(document.getElementById("calc-markup").value) / 100 || 0.10;
    const price    = parseFloat(document.getElementById(`p-price-${id}`)?.value) || 0;
    const name     = document.getElementById(`p-name-${id}`)?.value.trim() || "";
    const resultEl = document.getElementById(`p-result-${id}`);

    if (!price || !rates[currency]) {
      resultEl.className = "product-result";
      return;
    }

    const fee = 0.015; // 刷卡手續費
    const twd_raw = price * rates[currency];
    const cost    = Math.ceil(twd_raw * (1 + fee));
    const selling = Math.ceil(twd_raw * (1 + fee + markup));
    const profit  = selling - cost;

    resultEl.innerHTML = `
      <strong>${name || "商品"}</strong>：
      外幣 ${price.toLocaleString()} ${currency} ／
      成本 <strong>NT$${cost.toLocaleString()}</strong> ／
      代購價 <strong style="color:var(--pink)">NT$${selling.toLocaleString()}</strong> ／
      利潤 <strong style="color:#4caf50">NT$${profit.toLocaleString()}</strong>`;
    resultEl.className = "product-result show";

    updateCalcResults();
    updateCopywriter();
  };

  window.recalcAll = function() {
    productRows.forEach(id => recalcRow(id));
  };

  // 幣別或加成改變時重算
  document.getElementById("calc-currency")?.addEventListener("change", recalcAll);
  document.getElementById("calc-markup")?.addEventListener("input", recalcAll);

  function getProductData() {
    const currency = document.getElementById("calc-currency").value;
    const markup   = parseFloat(document.getElementById("calc-markup").value) / 100 || 0.10;
    const fee = 0.015;
    return productRows.map(id => {
      const name  = document.getElementById(`p-name-${id}`)?.value.trim() || "";
      const price = parseFloat(document.getElementById(`p-price-${id}`)?.value) || 0;
      const twd   = price * (rates[currency] || 0);
      const cost  = Math.ceil(twd * (1 + fee));
      const sell  = Math.ceil(twd * (1 + fee + markup));
      return { id, name, price, currency, cost, sell, profit: sell - cost };
    }).filter(p => p.name && p.price > 0);
  }

  function updateCalcResults() {
    const products = getProductData();
    const container = document.getElementById("calc-results");
    const rows      = document.getElementById("calc-result-rows");
    if (!products.length) { container.style.display = "none"; return; }
    container.style.display = "block";
    rows.innerHTML = products.map(p => `
      <div class="calc-result-row">
        <span class="calc-result-name">${p.name}</span>
        <span class="calc-result-vals">
          <span class="calc-cost">成本 NT$${p.cost.toLocaleString()}</span>
          <span class="calc-price">NT$${p.sell.toLocaleString()}</span>
          <span class="calc-profit">+${p.profit.toLocaleString()}</span>
        </span>
      </div>`).join("");
  }

  // ── 付款模式切換 ─────────────────────────────────────────────
  document.querySelectorAll('.mode-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      opt.querySelector('input').checked = true;
      [1,2,4].forEach(m => {
        const el = document.getElementById(`mode-extra-${m}`);
        if (el) el.style.display = "none";
      });
      const val = opt.dataset.mode;
      const extra = document.getElementById(`mode-extra-${val}`);
      if (extra) extra.style.display = "flex";
      updateCopywriter();
    });
  });

  // ── 預設收單時間（當天晚上 22:00） ───────────────────────────
  function setDefaultDeadline() {
    const now = new Date();
    now.setHours(22, 0, 0, 0);
    const pad = n => String(n).padStart(2, "0");
    const val = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T22:00`;
    document.getElementById("c-deadline").value = val;
  }
  setDefaultDeadline();
  document.getElementById("c-shipdate").placeholder = "待更新";

  // ── 文案生成 ─────────────────────────────────────────────────
  window.switchCopyTab = function(ct) {
    document.querySelectorAll(".copy-tab").forEach(t => t.classList.toggle("active", t.dataset.ct === ct));
    document.querySelectorAll(".copy-panel").forEach(p => p.classList.toggle("active", p.id === `ct-${ct}`));
  };

  function fmtDeadline(dtStr) {
    if (!dtStr) return "（請填寫）";
    const d = new Date(dtStr);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function updateCopywriter() {
    const name     = document.getElementById("c-name").value.trim() || "（團務名稱）";
    const deadline = fmtDeadline(document.getElementById("c-deadline").value);
    const shipdate = document.getElementById("c-shipdate").value.trim() || "待更新";
    const products = getProductData();

    if (!name || !products.length) {
      document.getElementById("copywriter-card").style.display = "none";
      return;
    }
    document.getElementById("copywriter-card").style.display = "block";

    const itemLines = products.map((p, i) => `${i+1}. NT$${p.sell.toLocaleString()}｜${p.price.toLocaleString()} ${p.currency}\u3000${p.name}`).join("\n");

    const itemLinesNoFx = products.map((p, i) => `${i+1}. NT$${p.sell.toLocaleString()} ${p.name}`).join("\n");

    const S = "𖬹";
    const memo   = name+"\n\n💰商品金額\n"+itemLines+"\n\n表單連結：\n收單時間："+deadline+"\n官方出貨時間："+shipdate+"\n\n✓以上都可以接受再跟團 需二補\n"+S+"跟團前請先詳閱記事本重要貼文裡的注意事項\n"+S+"填單即視同已閱讀並同意所有內容\n\n匯款完成後請在此記事本留下匯款帳戶末五碼\n謝謝";
    const note   = name+"\n\n💰商品金額\n"+itemLinesNoFx+"\n\n表單連結：\n收單時間："+deadline+"\n官方出貨時間："+shipdate+"\n\n✓以上都可以接受再跟團 需二補\n"+S+"跟團前請先詳閱記事本重要貼文裡的注意事項\n"+S+"填單即視同已閱讀並同意所有內容\n\n匯款完成後請在此記事本留下匯款帳戶末五碼\n謝謝";
    const social = "#代購 "+name+"\n\n💰商品金額\n"+itemLinesNoFx+"\n\n✓以上需二補 收單時間："+deadline+"\n"+S+"欲跟團者請加入社群填單匯款\n🔗：https://reurl.cc/EQ1rLk\n\n有任何問題都歡迎詢問 謝謝～";

    document.getElementById("txt-memo").value   = memo;
    document.getElementById("txt-note").value   = note;
    document.getElementById("txt-social").value = social;
  }

  // 即時更新文案
  ["c-name","c-deadline","c-shipdate"].forEach(id => {
    document.getElementById(id)?.addEventListener("input", updateCopywriter);
  });

  window.copyText = function(id) {
    const el = document.getElementById(id);
    navigator.clipboard.writeText(el.value).then(() => {
      const btn = el.nextElementSibling;
      btn.textContent = "✓ 已複製";
      setTimeout(() => btn.textContent = "複製", 1800);
    });
  };

  // ── 生成文案 & 儲存團務 ──────────────────────────────────────
  window.generateAll = async function() {
    const name = document.getElementById("c-name").value.trim();
    const mode = document.querySelector('input[name="c-mode"]:checked')?.value;
    if (!name) { alert("請填寫團務名稱"); return; }
    if (!mode) { alert("請選擇付款模式"); return; }
    const products = getProductData();
    if (!products.length) { alert("請新增至少一項商品並填入金額"); return; }

    updateCopywriter();

    // 儲存到 Firestore
    try {
      const deadline  = document.getElementById("c-deadline").value;
      const shipdate  = document.getElementById("c-shipdate").value || "待更新";
      const currency  = document.getElementById("calc-currency").value;
      const markup    = parseFloat(document.getElementById("calc-markup").value) || 10;

      const extraData = {};
      if (mode === "1") {
        extraData.bankName    = document.getElementById("c-bank-name").value;
        extraData.bankAccount = document.getElementById("c-bank-account").value;
      } else if (mode === "2") {
        extraData.warehouse = document.getElementById("c-warehouse").value;
      } else if (mode === "4") {
        extraData.buyshipUrl = document.getElementById("c-buyship-url").value;
      }

      await addDoc(collection(db, "campaigns"), {
        name, mode: parseInt(mode), deadline, shipdate,
        currency, markup,
        products: products.map(p => ({ name: p.name, foreignPrice: p.price, cost: p.cost, price: p.sell })),
        status: "open",
        createdAt: serverTimestamp(),
        ...extraData,
      });

      // 切換到文案 tab 讓使用者複製
      document.getElementById("copywriter-card").scrollIntoView({ behavior: "smooth" });
      alert(`✨ 團務「${name}」已儲存！請複製所需文案。`);
    } catch (e) {
      alert("儲存失敗：" + e.message);
    }
  };

  window.resetCampaignForm = function() {
    if (!confirm("確定要重置所有欄位嗎？")) return;
    document.getElementById("c-name").value = "";
    document.getElementById("c-shipdate").value = "";
    document.getElementById("products-list").innerHTML = "";
    productRows = []; rowCounter = 0;
    document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('selected'));
    [1,2,4].forEach(m => { const el = document.getElementById(`mode-extra-${m}`); if(el) el.style.display="none"; });
    document.getElementById("calc-results").style.display = "none";
    document.getElementById("copywriter-card").style.display = "none";
    setDefaultDeadline();
    applyNameColor("");
  };

  // ── btn-fetch-rates 綁定（避免 module 時序問題）────────────────
  document.getElementById("btn-fetch-rates")?.addEventListener("click", () => fetchRates());

  // ── 團務名稱顏色聯動 ─────────────────────────────────────────
  // 載入所有團體（含關鍵字/名稱），比對團務名稱後自動套色
  import { getDocs as _getDocs, collection as _col } from
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let groupKeywords = []; // [{ keywords:["關鍵字"], color:"#xxx" }]

  async function loadGroupKeywords() {
    try {
      const snap = await _getDocs(_col(db, "groups"));
      groupKeywords = [];
      snap.forEach(d => {
        const data = d.data();
        // 關鍵字：團體名稱本身（之後可擴充成員列表）
        groupKeywords.push({ keywords: [data.name], color: data.color });
      });
    } catch(e) { console.warn("載入團體失敗", e); }
  }

  function applyNameColor(name) {
    const bar = document.getElementById("rate-bar");
    if (!name) { bar.style.borderColor = "var(--border)"; return; }
    const matched = groupKeywords.find(g =>
      g.keywords.some(kw => name.includes(kw))
    );
    bar.style.borderColor = matched ? matched.color : "var(--border)";
    // 同時把整個開團表單頂部色條換色
    const card = document.querySelector("#section-campaigns .campaign-form-col .form-card");
    if (card) card.style.borderColor = matched ? matched.color : "var(--border)";
  }

  document.getElementById("c-name")?.addEventListener("input", function() {
    applyNameColor(this.value);
    updateCopywriter();
  });

  // 進入開團系統時載入關鍵字
  document.addEventListener("adminSectionChanged", (e) => {
    if (e.detail === "campaigns") {
      if (rates.KRW === null) fetchRates();
      loadGroupKeywords();
    }
  });
</script>

</body>
</html>
