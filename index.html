<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統管理</title>
  <style>
    :root {
      --surface: #ffffff;
      --border: #e0e0e0;
      --pink: #f06292;
      --grad: linear-gradient(45deg, #f06292, #ff8a80);
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    /* ── Modal 統一樣式 ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    /* 預設隱藏 Modal */
    .modal-backdrop.hidden {
      display: none;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%; max-width: 480px;
      max-height: 85vh;
      margin: auto;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      border: 1.5px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    /* 針對需要加寬的 Modal */
    .modal.modal-wide {
      max-width: 640px;
    }

    /* 頂部標題區 */
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 16px;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 17px; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .modal-close {
      background: #fde0ef; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 13px; cursor: pointer;
      color: var(--pink); display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--pink); color: #fff; }

    /* 內容區塊 */
    .modal-body {
      padding: 0 26px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      margin-bottom: 22px;
    }

    /* 自訂捲軸 */
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }
    .modal-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
    .modal-body::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 底部按鈕區 */
    .modal-footer {
      padding: 0 26px 22px;
      display: flex; justify-content: flex-end; gap: 10px;
      flex-shrink: 0;
    }

    /* 基本按鈕樣式 */
    button.btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button.btn-primary { background: var(--pink); color: white; }
    button.btn-secondary { background: #e0e0e0; color: #333; }
    button.btn:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <!-- 觸發按鈕範例 -->
  <button class="btn btn-primary" onclick="document.getElementById('modal-merge-orders').classList.remove('hidden')">
    開啟合併訂單 Modal (寬版)
  </button>
  
  <button class="btn btn-secondary" onclick="document.getElementById('modal-group').classList.remove('hidden')">
    開啟群組 Modal (標準版)
  </button>

  <!-- 寬版 Modal (合併訂單) -->
  <div id="modal-merge-orders" class="modal-backdrop hidden">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 class="modal-title">合併訂單</h2>
        <button class="modal-close" onclick="document.getElementById('modal-merge-orders').classList.add('hidden')">✕</button>
      </div>
      <div class="modal-body">
        <p>這裡是可以自動捲動的內容區塊...</p>
        <div style="height: 300px; background: #fafafa; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center;">
          模擬長內容填補區塊
        </div>
        <p>底部內容...</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-merge-orders').classList.add('hidden')">取消</button>
        <button class="btn btn-primary">確認合併</button>
      </div>
    </div>
  </div>

  <!-- 標準版 Modal (群組) -->
  <div id="modal-group" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">群組設定</h2>
        <button class="modal-close" onclick="document.getElementById('modal-group').classList.add('hidden')">✕</button>
      </div>
      <div class="modal-body">
        <p>這是標準寬度的 Modal，適合用來顯示設定項目或簡短表單。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-group').classList.add('hidden')">關閉</button>
        <button class="btn btn-primary">儲存</button>
      </div>
    </div>
  </div>

</body>
</html>
