<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>團購系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f3;
      --surface:   #ffffff;
      --border:    #e2e0d8;
      --text:      #1a1a18;
      --text-muted:#6b6b66;
      --primary:   #1D9E75;
      --primary-hover: #0F6E56;
      --admin:     #534AB7;
      --danger:    #A32D2D;
      --radius:    10px;
      --shadow:    0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 頂部導覽列 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .role-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      display: none;
    }

    .role-badge.admin {
      background: #EEEDFE;
      color: var(--admin);
    }

    .role-badge.user {
      background: #E1F5EE;
      color: var(--primary-hover);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .user-name {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 按鈕 ── */
    .btn {
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) { background: var(--bg); }

    /* ── 主內容區 ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── 登入畫面 ── */
    #view-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      text-align: center;
      gap: 16px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-google {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-google:hover { background: var(--bg); box-shadow: var(--shadow); }

    .btn-google svg { flex-shrink: 0; }

    .login-error {
      font-size: 13px;
      color: var(--danger);
      display: none;
      margin-top: 12px;
    }

    /* ── 載入中 ── */
    #view-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      color: var(--text-muted);
      font-size: 14px;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 分頁標籤（管理者才看到兩個） ── */
    .tabs {
      display: none;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--primary);
    }

    .tab-btn.admin-only {
      color: var(--admin);
      opacity: 0.7;
    }

    .tab-btn.admin-only.active {
      opacity: 1;
      border-bottom-color: var(--admin);
    }

    /* ── 分頁內容 ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 佔位內容（之後替換） ── */
    .placeholder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder-card h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .placeholder-card p  { font-size: 14px; line-height: 1.6; }

    /* ── 響應式 ── */
    @media (max-width: 480px) {
      main { padding: 20px 16px; }
      .login-card { padding: 32px 24px; }
      .user-name { display: none; }
    }
  </style>
</head>
<body>

<!-- 頂部導覽列 -->
<header>
  <div class="header-left">
    <span class="site-title">🛒 團購系統</span>
    <span class="role-badge" id="role-badge"></span>
  </div>
  <div class="header-right">
    <div class="user-info" id="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="頭像" />
      <span class="user-name" id="user-name"></span>
    </div>
    <button class="btn btn-ghost" id="btn-signout" style="display:none" onclick="handleSignOut()">登出</button>
    <button class="btn btn-primary" id="btn-signin-header" style="display:none" onclick="handleSignIn()">登入</button>
  </div>
</header>

<main>

  <!-- 載入中 -->
  <div id="view-loading">
    <div class="spinner"></div>
    <span>載入中...</span>
  </div>

  <!-- 登入畫面 -->
  <div id="view-login" style="display:none">
    <div class="login-card">
      <h1>歡迎使用團購系統</h1>
      <p>請使用 Google 帳號登入，<br>即可瀏覽目前開放的團購活動。</p>
      <button class="btn-google" id="btn-signin" onclick="handleSignIn()">
        <!-- Google Logo SVG -->
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.576c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.576 9 3.576z" fill="#EA4335"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- 登入後主畫面 -->
  <div id="view-app" style="display:none">

    <!-- 分頁標籤 -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="orders" onclick="switchTab('orders')">團購活動</button>
      <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')">訂單管理</button>
    </div>

    <!-- 下單系統（所有人可見） -->
    <div class="tab-panel active" id="tab-orders">
      <div class="placeholder-card">
        <h2>團購活動</h2>
        <p>這裡將顯示目前開放中的團務列表。<br>下一步開發：團務卡片 + 下單流程。</p>
      </div>
    </div>

    <!-- 訂單管理（僅管理者可見） -->
    <div class="tab-panel" id="tab-admin">
      <div class="placeholder-card">
        <h2>訂單管理後台</h2>
        <p>這裡將顯示所有訂單與管理功能。<br>下一步開發：訂單列表 + 狀態管理。</p>
      </div>
    </div>

  </div>

</main>

<script type="module">
  import { signInWithGoogle, signOutUser, watchAuthState, handleRedirectResult } from "./auth.js";

  let currentRole = null;

  // ── 初始化：先處理 Redirect 結果，再啟動狀態監聽 ─────────────
  // 必須等 handleRedirectResult() 完成後才啟動 watchAuthState()
  // 否則 Firebase 尚未處理完 redirect token 時會先觸發「未登入」
  // 導致畫面錯誤地跳回登入頁
  async function init() {
    document.getElementById("view-loading").style.display = "flex";
    console.log("[init] 開始，處理 redirect result...");

    try {
      await handleRedirectResult();
      console.log("[init] handleRedirectResult 完成");
    } catch (error) {
      console.error("[init] Redirect 結果處理失敗：", error.code, error.message);
      const errorEl = document.getElementById("login-error");
      if (errorEl) {
        errorEl.textContent = "登入失敗：" + (error.code ?? error.message);
        errorEl.style.display = "block";
      }
    }

    console.log("[init] 啟動 watchAuthState...");
    watchAuthState(({ user, role }) => {
      console.log("[watchAuthState] 觸發，user:", user ? user.email : "null", "role:", role);
      currentRole = role;

      if (!user) {
        showView("login");
        document.getElementById("btn-signin-header").style.display = "inline-flex";
        document.getElementById("btn-signout").style.display = "none";
        document.getElementById("user-info").style.display = "none";
        document.getElementById("role-badge").style.display = "none";
      } else {
        showView("app");
        setupAppUI(user, role);
      }
    });
  }

  init();

  // ── 設定登入後的 UI ───────────────────────────────────────────
  function setupAppUI(user, role) {
    // 導覽列
    const avatar = document.getElementById("user-avatar");
    if (user.photoURL) avatar.src = user.photoURL;
    document.getElementById("user-name").textContent = user.displayName || user.email;
    document.getElementById("user-info").style.display = "flex";
    document.getElementById("btn-signout").style.display = "inline-flex";
    document.getElementById("btn-signin-header").style.display = "none";

    // 角色徽章
    const badge = document.getElementById("role-badge");
    badge.textContent = role === "admin" ? "管理者" : "一般會員";
    badge.className = `role-badge ${role}`;
    badge.style.display = "inline-block";

    // 分頁：管理者顯示兩個，一般使用者只顯示一個
    const tabs = document.getElementById("tabs");
    tabs.style.display = "flex";

    const adminTab = tabs.querySelector('[data-tab="admin"]');
    if (role === "admin") {
      adminTab.style.display = "inline-flex";
    } else {
      adminTab.style.display = "none";
      // 確保一般使用者不會停在 admin 分頁
      switchTab("orders");
    }
  }

  // ── 分頁切換 ─────────────────────────────────────────────────
  window.switchTab = function(tabName) {
    // 只有管理者能切到 admin
    if (tabName === "admin" && currentRole !== "admin") return;

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === tabName);
    });
    document.querySelectorAll(".tab-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === `tab-${tabName}`);
    });
  };

  // ── 切換 view ────────────────────────────────────────────────
  function showView(name) {
    document.getElementById("view-loading").style.display = "none";
    document.getElementById("view-login").style.display = "none";
    document.getElementById("view-app").style.display = "none";

    if (name === "login")   document.getElementById("view-login").style.display = "flex";
    if (name === "app")     document.getElementById("view-app").style.display = "block";
  }

  // ── 登入 / 登出 ──────────────────────────────────────────────
  window.handleSignIn = async function() {
    const errorEl = document.getElementById("login-error");
    errorEl.style.display = "none";
    try {
      await signInWithGoogle();
    } catch (e) {
      errorEl.textContent = "登入失敗，請再試一次。";
      errorEl.style.display = "block";
    }
  };

  window.handleSignOut = async function() {
    await signOutUser();
  };
</script>

</body>
</html>
