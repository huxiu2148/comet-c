<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C♡MET 團務管理系統</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #ff9a9e;
      --secondary: #fad0c4;
      --accent: #fbc2eb;
      --bg: #fff5f6;
      --text: #5d4a4a;
      --white: #ffffff;
    }
    * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
    body { background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    /* UI 組件 */
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-ghost { background: #eee; color: #666; }
    .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
    
    /* 彈窗樣式 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn-close { background: none; border: none; font-size: 24px; cursor: pointer; }

    /* 表格 */
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; overflow: hidden; }
    .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .admin-table th { background: var(--secondary); }

    /* 分頁顯示控制 */
    .admin-section { display: none; }
    .admin-section.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <nav style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button class="btn btn-primary" onclick="switchTab('section-campaigns')">📦 開團系統</button>
    <button class="btn btn-primary" onclick="switchTab('section-campaign-mgmt')">📋 團務管理</button>
    <button class="btn btn-primary" onclick="switchTab('section-orders')">🧾 訂單管理</button>
    <button class="btn btn-primary" onclick="switchTab('section-cart')">🛒 下單管理</button>
    <button class="btn btn-primary" onclick="switchTab('section-finance')">💰 記帳</button>
    <button class="btn btn-primary" onclick="switchTab('section-members')">👤 會員管理</button>
  </nav>

  <div class="admin-section active" id="section-campaigns">
    <h2>📦 建立新團務</h2>
    <input type="text" id="campaign-title" class="form-control" placeholder="團務名稱 (如: NCT WISH 2nd Single)">
    <div style="margin: 10px 0;">
      <label>批量匯入商品 (CSV/XLSX): </label>
      <input type="file" id="import-file" accept=".csv, .xlsx" onchange="handleFileImport(this)">
    </div>
    <div class="campaign-actions">
      <button class="btn btn-ghost" onclick="resetCampaignForm()">重置</button>
      <button class="btn btn-primary" onclick="saveNewCampaign()">✨ 儲存團務</button>
    </div>
  </div> <div class="admin-section" id="section-campaign-mgmt">
    <h2>📋 團務管理列表</h2>
    <table class="admin-table">
      <thead>
        <tr>
          <th>團務名稱</th>
          <th>建立日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="campaign-list-body"></tbody>
    </table>
  </div>

  <div class="admin-section" id="section-orders"><h2>🧾 訂單管理內容</h2></div>
  <div class="admin-section" id="section-cart"><h2>🛒 下單管理內容</h2></div>
  <div class="admin-section" id="section-finance"><h2>💰 記帳內容</h2></div>
  <div class="admin-section" id="section-members"><h2>👤 會員管理內容</h2></div>

</div>

<div id="modal-item-mgmt" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="item-mgmt-title">管理商品</h3>
      <button class="btn-close" onclick="closeItemMgmt()">&times;</button>
    </div>
    
    <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem;">
      <input type="text" id="new-item-name" placeholder="商品名稱" class="form-control" style="flex:2">
      <input type="number" id="new-item-price" placeholder="代購價" class="form-control" style="flex:1">
      <input type="number" id="new-item-foreign" placeholder="外幣" class="form-control" style="flex:1">
      <button class="btn btn-primary" onclick="addItemRow()">➕ 新增</button>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>商品名稱</th>
          <th>代購價</th>
          <th>外幣</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="item-list-body"></tbody>
    </table>

    <div class="modal-footer" style="margin-top: 1rem;">
      <button class="btn btn-primary" style="width: 100%;" onclick="saveItemChanges()">💾 儲存所有變更</button>
    </div>
  </div>
</div>

<script type="module">
  import { db, auth } from "./auth.js";
  import { 
    collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.db = db;
  window.FB = { doc, updateDoc, serverTimestamp };

  let _campaigns = [];
  let _currentCampaignId = null;
  let _tempItems = [];

  // 分頁切換
  window.switchTab = (tabId) => {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if(tabId === 'section-campaign-mgmt') loadCampaigns();
  };

  // 自動判斷編碼的 CSV 解析 (解決亂碼)
  async function parseImportFile(file) {
    const ext = file.name.split(".").pop().toLowerCase();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const buffer = e.target.result;
        const view = new Uint8Array(buffer);
        let text = "";
        
        if (ext === "csv") {
          const hasBOM = view.length >= 3 && view[0] === 0xef && view[1] === 0xbb && view[2] === 0xbf;
          text = new TextDecoder(hasBOM ? "utf-8" : "utf-8").decode(view);
          if (!hasBOM && text.includes("")) {
            text = new TextDecoder("big5").decode(view);
          }
          const rows = text.split("\n").slice(2).map(l => l.split(",").map(c => c.trim())).filter(r => r[0]);
          resolve(rows);
        } else {
          const wb = XLSX.read(view, { type: "array" });
          const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
          resolve(data.slice(2).filter(r => r[0]));
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  window.handleFileImport = async (input) => {
    if(!input.files[0]) return;
    const data = await parseImportFile(input.files[0]);
    window.lastImportedItems = data.map(r => ({ name: r[0], price: Number(r[1]), foreignPrice: Number(r[2]) || 0 }));
    alert(`成功讀取 ${window.lastImportedItems.length} 項商品`);
  };

  window.saveNewCampaign = async () => {
    const title = document.getElementById('campaign-title').value;
    if(!title) return alert("請輸入標題");
    await addDoc(collection(db, "campaigns"), {
      title,
      items: window.lastImportedItems || [],
      createdAt: serverTimestamp()
    });
    alert("儲存成功");
    switchTab('section-campaign-mgmt');
  };

  window.loadCampaigns = async () => {
    const q = query(collection(db, "campaigns"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    _campaigns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const tbody = document.getElementById('campaign-list-body');
    tbody.innerHTML = _campaigns.map(c => `
      <tr>
        <td>${c.title}</td>
        <td>${c.createdAt?.toDate().toLocaleDateString() || '-'}</td>
        <td>
          <button class="btn btn-ghost" onclick="openItemMgmt('${c.id}', '${c.title}')">📦 商品</button>
          <button class="btn btn-ghost" style="color:red" onclick="deleteCampaign('${c.id}')">刪除</button>
        </td>
      </tr>
    `).join('');
  };

  window.deleteCampaign = async (id) => {
    if(!confirm("確定刪除？")) return;
    await deleteDoc(doc(db, "campaigns", id));
    loadCampaigns();
  };

  // 商品管理邏輯
  window.openItemMgmt = (id, name) => {
    _currentCampaignId = id;
    document.getElementById('item-mgmt-title').innerText = `管理：${name}`;
    const c = _campaigns.find(i => i.id === id);
    _tempItems = c.items ? JSON.parse(JSON.stringify(c.items)) : [];
    renderItemRows();
    document.getElementById('modal-item-mgmt').style.display = 'flex';
  };

  window.closeItemMgmt = () => document.getElementById('modal-item-mgmt').style.display = 'none';

  function renderItemRows() {
    document.getElementById('item-list-body').innerHTML = _tempItems.map((item, i) => `
      <tr>
        <td><input class="form-control" value="${item.name}" onchange="_tempItems[${i}].name=this.value"></td>
        <td><input type="number" class="form-control" value="${item.price}" onchange="_tempItems[${i}].price=Number(this.value)"></td>
        <td><input type="number" class="form-control" value="${item.foreignPrice||0}" onchange="_tempItems[${i}].foreignPrice=Number(this.value)"></td>
        <td><button onclick="_tempItems.splice(${i},1);renderItemRows()">❌</button></td>
      </tr>
    `).join('');
  }

  window.addItemRow = () => {
    const n = document.getElementById('new-item-name').value;
    const p = Number(document.getElementById('new-item-price').value);
    const f = Number(document.getElementById('new-item-foreign').value);
    if(!n) return;
    _tempItems.push({ name: n, price: p, foreignPrice: f });
    renderItemRows();
  };

  window.saveItemChanges = async () => {
    await updateDoc(doc(db, "campaigns", _currentCampaignId), { items: _tempItems });
    alert("儲存成功");
    closeItemMgmt();
    loadCampaigns();
  };
</script>

</body>
</html>
