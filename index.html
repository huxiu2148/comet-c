<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>團購系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f3;
      --surface:   #ffffff;
      --border:    #e2e0d8;
      --text:      #1a1a18;
      --text-muted:#6b6b66;
      --primary:   #1D9E75;
      --primary-hover: #0F6E56;
      --admin:     #534AB7;
      --danger:    #A32D2D;
      --radius:    10px;
      --shadow:    0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 頂部導覽列 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .role-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      display: none;
    }

    .role-badge.admin {
      background: #EEEDFE;
      color: var(--admin);
    }

    .role-badge.user {
      background: #E1F5EE;
      color: var(--primary-hover);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .user-name {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 按鈕 ── */
    .btn {
      padding: 7px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) { background: var(--bg); }

    /* ── 主內容區 ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── 登入畫面 ── */
    #view-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      text-align: center;
      gap: 16px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-google {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-google:hover { background: var(--bg); box-shadow: var(--shadow); }

    .btn-google svg { flex-shrink: 0; }

    .login-error {
      font-size: 13px;
      color: var(--danger);
      display: none;
      margin-top: 12px;
    }

    /* ── 載入中 ── */
    #view-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
      color: var(--text-muted);
      font-size: 14px;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 分頁標籤（管理者才看到兩個） ── */
    .tabs {
      display: none;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--primary);
    }

    .tab-btn.admin-only {
      color: var(--admin);
      opacity: 0.7;
    }

    .tab-btn.admin-only.active {
      opacity: 1;
      border-bottom-color: var(--admin);
    }

    /* ── 分頁內容 ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 佔位內容（之後替換） ── */
    .placeholder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder-card h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .placeholder-card p  { font-size: 14px; line-height: 1.6; }

    /* ── 響應式 ── */
    @media (max-width: 480px) {
      main { padding: 20px 16px; }
      .login-card { padding: 32px 24px; }
      .user-name { display: none; }
    }

    /* ── 後台子導覽 ── */
    .admin-subnav {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .subnav-btn {
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .subnav-btn.active {
      color: var(--text);
      border-bottom-color: var(--primary);
    }

    /* ── 後台區塊 ── */
    .admin-section { display: none; }
    .admin-section.active { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
    }

    /* ── 卡片格狀排列 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .loading-row {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-row {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── 團體卡片 ── */
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .group-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--group-color, var(--primary));
    }

    .group-card-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .group-card-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .group-card-color {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.1);
    }

    .group-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #f09595;
    }

    .btn-danger:hover { background: #fcebeb; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      line-height: 1;
    }

    .modal-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ── 表單 ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .required { color: var(--danger); }

    .form-input {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--primary); }

    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-input {
      width: 44px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
      cursor: pointer;
      background: var(--surface);
    }

    .color-hint {
      font-size: 13px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .color-presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .color-preset {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }

    .color-preset:hover { transform: scale(1.2); }

    .form-error {
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
    }

  </style>
</head>
<body>

<!-- 頂部導覽列 -->
<header>
  <div class="header-left">
    <span class="site-title">🛒 團購系統</span>
    <span class="role-badge" id="role-badge"></span>
  </div>
  <div class="header-right">
    <div class="user-info" id="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="頭像" />
      <span class="user-name" id="user-name"></span>
    </div>
    <button class="btn btn-ghost" id="btn-signout" style="display:none" onclick="handleSignOut()">登出</button>
    <button class="btn btn-primary" id="btn-signin-header" style="display:none" onclick="handleSignIn()">登入</button>
  </div>
</header>

<main>

  <!-- 載入中 -->
  <div id="view-loading">
    <div class="spinner"></div>
    <span>載入中...</span>
  </div>

  <!-- 登入畫面 -->
  <div id="view-login" style="display:none">
    <div class="login-card">
      <h1>歡迎使用團購系統</h1>
      <p>請使用 Google 帳號登入，<br>即可瀏覽目前開放的團購活動。</p>
      <button class="btn-google" id="btn-signin" onclick="handleSignIn()">
        <!-- Google Logo SVG -->
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.576c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.576 9 3.576z" fill="#EA4335"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- 登入後主畫面 -->
  <div id="view-app" style="display:none">

    <!-- 分頁標籤 -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="orders" onclick="switchTab('orders')">團購活動</button>
      <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')">訂單管理</button>
    </div>

    <!-- 下單系統（所有人可見） -->
    <div class="tab-panel active" id="tab-orders">
      <div class="placeholder-card">
        <h2>團購活動</h2>
        <p>這裡將顯示目前開放中的團務列表。<br>下一步開發：團務卡片 + 下單流程。</p>
      </div>
    </div>

    <!-- 訂單管理（僅管理者可見） -->
    <div class="tab-panel" id="tab-admin">

      <!-- 後台子導覽 -->
      <div class="admin-subnav">
        <button class="subnav-btn active" data-section="groups" onclick="switchAdminSection('groups')">團體管理</button>
        <button class="subnav-btn" data-section="campaigns" onclick="switchAdminSection('campaigns')">團務管理</button>
        <button class="subnav-btn" data-section="orders" onclick="switchAdminSection('orders')">訂單管理</button>
      </div>

      <!-- 團體管理 -->
      <div class="admin-section active" id="section-groups">
        <div class="section-header">
          <h2 class="section-title">團體管理</h2>
          <button class="btn btn-primary" onclick="openGroupModal()">新增團體</button>
        </div>
        <div id="groups-list" class="card-grid">
          <div class="loading-row">載入中...</div>
        </div>
      </div>

      <!-- 團務管理（下一步開發） -->
      <div class="admin-section" id="section-campaigns">
        <div class="placeholder-card">
          <h2>團務管理</h2>
          <p>即將開發</p>
        </div>
      </div>

      <!-- 訂單管理（下一步開發） -->
      <div class="admin-section" id="section-orders">
        <div class="placeholder-card">
          <h2>訂單管理</h2>
          <p>即將開發</p>
        </div>
      </div>

    </div>

    <!-- 新增/編輯團體 Modal -->
    <div class="modal-backdrop" id="modal-group" style="display:none" onclick="closeGroupModal(event)">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-group-title">新增團體</h3>
          <button class="modal-close" onclick="closeGroupModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">團體名稱 <span class="required">*</span></label>
            <input class="form-input" id="input-group-name" type="text" placeholder="例：登山社" maxlength="20" />
          </div>
          <div class="form-group">
            <label class="form-label">代表顏色 <span class="required">*</span></label>
            <div class="color-picker-row">
              <input class="color-input" id="input-group-color" type="color" value="#1D9E75" />
              <span class="color-hint" id="color-hint">#1D9E75</span>
            </div>
            <div class="color-presets">
              <button class="color-preset" style="background:#1D9E75" onclick="setColor('#1D9E75')"></button>
              <button class="color-preset" style="background:#534AB7" onclick="setColor('#534AB7')"></button>
              <button class="color-preset" style="background:#D85A30" onclick="setColor('#D85A30')"></button>
              <button class="color-preset" style="background:#185FA5" onclick="setColor('#185FA5')"></button>
              <button class="color-preset" style="background:#854F0B" onclick="setColor('#854F0B')"></button>
              <button class="color-preset" style="background:#993556" onclick="setColor('#993556')"></button>
              <button class="color-preset" style="background:#3B6D11" onclick="setColor('#3B6D11')"></button>
              <button class="color-preset" style="background:#5F5E5A" onclick="setColor('#5F5E5A')"></button>
            </div>
          </div>
          <p class="form-error" id="group-form-error"></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeGroupModal()">取消</button>
          <button class="btn btn-primary" id="btn-save-group" onclick="saveGroup()">儲存</button>
        </div>
      </div>
    </div>

  </div>

</main>

<script type="module">
  import { signInWithGoogle, signOutUser, watchAuthState } from "./auth.js";

  let currentRole = null;

  // ── 初始化：先處理 Redirect 結果，再啟動狀態監聽 ─────────────
  // 監聽登入狀態，登入/登出時自動更新畫面
  watchAuthState(({ user, role }) => {
      currentRole = role;

      if (!user) {
        showView("login");
        document.getElementById("btn-signin-header").style.display = "inline-flex";
        document.getElementById("btn-signout").style.display = "none";
        document.getElementById("user-info").style.display = "none";
        document.getElementById("role-badge").style.display = "none";
      } else {
        showView("app");
        setupAppUI(user, role);
      }
    });

  // ── 設定登入後的 UI ───────────────────────────────────────────
  function setupAppUI(user, role) {
    // 導覽列
    const avatar = document.getElementById("user-avatar");
    if (user.photoURL) avatar.src = user.photoURL;
    document.getElementById("user-name").textContent = user.displayName || user.email;
    document.getElementById("user-info").style.display = "flex";
    document.getElementById("btn-signout").style.display = "inline-flex";
    document.getElementById("btn-signin-header").style.display = "none";

    // 角色徽章
    const badge = document.getElementById("role-badge");
    badge.textContent = role === "admin" ? "管理者" : "一般會員";
    badge.className = `role-badge ${role}`;
    badge.style.display = "inline-block";

    // 分頁：管理者顯示兩個，一般使用者只顯示一個
    const tabs = document.getElementById("tabs");
    tabs.style.display = "flex";

    const adminTab = tabs.querySelector('[data-tab="admin"]');
    if (role === "admin") {
      adminTab.style.display = "inline-flex";
    } else {
      adminTab.style.display = "none";
      // 確保一般使用者不會停在 admin 分頁
      switchTab("orders");
    }
  }

  // ── 分頁切換 ─────────────────────────────────────────────────
  window.switchTab = function(tabName) {
    // 只有管理者能切到 admin
    if (tabName === "admin" && currentRole !== "admin") return;

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === tabName);
    });
    document.querySelectorAll(".tab-panel").forEach(panel => {
      panel.classList.toggle("active", panel.id === `tab-${tabName}`);
    });
  };

  // ── 切換 view ────────────────────────────────────────────────
  function showView(name) {
    document.getElementById("view-loading").style.display = "none";
    document.getElementById("view-login").style.display = "none";
    document.getElementById("view-app").style.display = "none";

    if (name === "login")   document.getElementById("view-login").style.display = "flex";
    if (name === "app")     document.getElementById("view-app").style.display = "block";
  }

  // ── 登入 / 登出 ──────────────────────────────────────────────
  window.handleSignIn = async function() {
    const errorEl = document.getElementById("login-error");
    errorEl.style.display = "none";
    try {
      await signInWithGoogle();
    } catch (e) {
      errorEl.textContent = "登入失敗，請再試一次。";
      errorEl.style.display = "block";
    }
  };

  window.handleSignOut = async function() {
    await signOutUser();
  };
</script>


<script type="module">
  import { db } from "./auth.js";
  import {
    collection, doc, addDoc, getDocs, deleteDoc,
    serverTimestamp, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── 後台子導覽切換 ─────────────────────────────────────────────
  window.switchAdminSection = function(section) {
    document.querySelectorAll(".subnav-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.section === section);
    });
    document.querySelectorAll(".admin-section").forEach(el => {
      el.classList.toggle("active", el.id === `section-${section}`);
    });
    if (section === "groups") loadGroups();
  };

  // ── 團體列表 ──────────────────────────────────────────────────
  async function loadGroups() {
    const list = document.getElementById("groups-list");
    list.innerHTML = '<div class="loading-row">載入中...</div>';
    try {
      const q = query(collection(db, "groups"), orderBy("createdAt", "asc"));
      const snap = await getDocs(q);
      if (snap.empty) {
        list.innerHTML = '<div class="empty-row">尚無團體，點右上角「新增團體」開始建立。</div>';
        return;
      }
      list.innerHTML = "";
      snap.forEach(docSnap => {
        list.appendChild(renderGroupCard(docSnap.id, docSnap.data()));
      });
    } catch (e) {
      list.innerHTML = `<div class="empty-row" style="color:var(--danger)">載入失敗：${e.message}</div>`;
    }
  }

  function renderGroupCard(id, data) {
    const card = document.createElement("div");
    card.className = "group-card";
    card.style.setProperty("--group-color", data.color);
    card.innerHTML = `
      <div class="group-card-name">${escHtml(data.name)}</div>
      <div class="group-card-color">
        <span class="color-dot" style="background:${data.color}"></span>
        <span>${data.color}</span>
      </div>
      <div class="group-card-meta">建立於 ${formatDate(data.createdAt)}</div>
      <div class="group-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="openGroupModal('${id}', '${escHtml(data.name)}', '${data.color}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGroup('${id}', '${escHtml(data.name)}')">刪除</button>
      </div>`;
    return card;
  }

  // ── Modal 開關 ────────────────────────────────────────────────
  let editingGroupId = null;

  window.openGroupModal = function(id = null, name = "", color = "#1D9E75") {
    editingGroupId = id;
    document.getElementById("modal-group-title").textContent = id ? "編輯團體" : "新增團體";
    document.getElementById("input-group-name").value = name;
    document.getElementById("input-group-color").value = color;
    document.getElementById("color-hint").textContent = color;
    document.getElementById("group-form-error").textContent = "";
    document.getElementById("modal-group").style.display = "flex";
    setTimeout(() => document.getElementById("input-group-name").focus(), 50);
  };

  window.closeGroupModal = function(e) {
    if (e && e.target !== document.getElementById("modal-group")) return;
    document.getElementById("modal-group").style.display = "none";
    editingGroupId = null;
  };

  // ── 顏色選取 ──────────────────────────────────────────────────
  window.setColor = function(hex) {
    document.getElementById("input-group-color").value = hex;
    document.getElementById("color-hint").textContent = hex;
  };

  document.getElementById("input-group-color").addEventListener("input", function() {
    document.getElementById("color-hint").textContent = this.value;
  });

  // ── 儲存團體（新增 / 編輯）──────────────────────────────────
  window.saveGroup = async function() {
    const name  = document.getElementById("input-group-name").value.trim();
    const color = document.getElementById("input-group-color").value;
    const errEl = document.getElementById("group-form-error");
    const btn   = document.getElementById("btn-save-group");

    if (!name) { errEl.textContent = "請填寫團體名稱"; return; }

    btn.disabled = true;
    btn.textContent = "儲存中...";
    errEl.textContent = "";

    try {
      if (editingGroupId) {
        const { updateDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        await updateDoc(doc(db, "groups", editingGroupId), { name, color });
      } else {
        await addDoc(collection(db, "groups"), {
          name, color, createdAt: serverTimestamp()
        });
      }
      document.getElementById("modal-group").style.display = "none";
      editingGroupId = null;
      await loadGroups();
    } catch (e) {
      errEl.textContent = "儲存失敗：" + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "儲存";
    }
  };

  // ── 刪除團體 ──────────────────────────────────────────────────
  window.deleteGroup = async function(id, name) {
    if (!confirm(`確定要刪除「${name}」嗎？
此操作無法復原。`)) return;
    try {
      await deleteDoc(doc(db, "groups", id));
      await loadGroups();
    } catch (e) {
      alert("刪除失敗：" + e.message);
    }
  };

  // ── 工具函式 ──────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function formatDate(ts) {
    if (!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  }

  // 頁面載入時如果已在 admin tab，自動載入團體列表
  document.addEventListener("DOMContentLoaded", () => {
    const adminTab = document.getElementById("tab-admin");
    if (adminTab?.classList.contains("active")) loadGroups();
  });

  // 切換到 admin tab 時自動載入
  const origSwitch = window.switchTab;
  window.switchTab = function(tabName) {
    origSwitch(tabName);
    if (tabName === "admin") loadGroups();
  };
</script>

</body>
</html>
